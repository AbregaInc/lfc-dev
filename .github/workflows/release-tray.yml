name: Release Tray App

on:
  push:
    branches: [main]
    paths:
      - 'apps/tray/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          # Get latest release tag, default to v0.1.0 if none
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            VERSION="0.1.0"
          else
            # Strip 'v' prefix and bump patch
            BASE="${LATEST#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: v$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in tauri.conf.json
        run: |
          cd apps/tray/src-tauri
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.bump.outputs.version }}"/' tauri.conf.json

      - name: Update version in Cargo.toml
        run: |
          cd apps/tray/src-tauri
          sed -i 's/^version = "[^"]*"/version = "${{ steps.bump.outputs.version }}"/' Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/tray/src-tauri/tauri.conf.json apps/tray/src-tauri/Cargo.toml
          git diff --cached --quiet && echo "No version changes" || \
            git commit -m "chore: bump tray app to v${{ steps.bump.outputs.version }}"
          git push

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/tray

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tray/src-tauri

      - name: Prepare App Store Connect API key
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_API_PRIVATE_KEY }}" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
            printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Probe macOS signing setup
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euxo pipefail

          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          KEYCHAIN_PATH="$RUNNER_TEMP/lfc-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/lfc-signing-cert.p12"
          TEST_BINARY="$RUNNER_TEMP/codesign-probe"

          cleanup() {
            security delete-keychain "$KEYCHAIN_PATH" || true
            rm -f "$P12_PATH" "$TEST_BINARY"
          }
          trap cleanup EXIT

          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          cp /bin/ls "$TEST_BINARY"
          chmod u+w "$TEST_BINARY"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN_PATH" "$TEST_BINARY"
          codesign --verify --verbose=4 "$TEST_BINARY"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (v1 uses TAURI_PRIVATE_KEY)
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ''
          # macOS code signing / notarization. Either APPLE_ID+APPLE_PASSWORD+APPLE_TEAM_ID
          # or APPLE_API_ISSUER+APPLE_API_KEY+APPLE_API_PRIVATE_KEY must be provided.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          projectPath: apps/tray
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: 'LFC ${{ needs.version.outputs.tag }}'
          releaseBody: |
            Download the installer for your platform:
            - **macOS Apple Silicon**: `.dmg` (aarch64)
            - **macOS Intel**: `.dmg` (x64)
            - **Windows**: `.msi`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          assetNamePattern: '[name]_[arch][ext]'
          args: --target ${{ matrix.target }}
