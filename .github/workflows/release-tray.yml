name: Release Tray App

on:
  push:
    branches: [main]
    paths:
      - 'apps/tray/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          # Get latest release tag, default to v0.1.0 if none
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            VERSION="0.1.0"
          else
            # Strip 'v' prefix and bump patch
            BASE="${LATEST#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: v$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in tauri.conf.json
        run: |
          cd apps/tray/src-tauri
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.bump.outputs.version }}"/' tauri.conf.json

      - name: Update version in Cargo.toml
        run: |
          cd apps/tray/src-tauri
          sed -i 's/^version = "[^"]*"/version = "${{ steps.bump.outputs.version }}"/' Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/tray/src-tauri/tauri.conf.json apps/tray/src-tauri/Cargo.toml
          git diff --cached --quiet && echo "No version changes" || \
            git commit -m "chore: bump tray app to v${{ steps.bump.outputs.version }}"
          git push

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/tray

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tray/src-tauri

      # macOS code signing (when certs are available)
      - name: Import Apple certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing (v1 uses TAURI_PRIVATE_KEY)
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/tray
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: 'LFC ${{ needs.version.outputs.tag }}'
          releaseBody: |
            Download the installer for your platform:
            - **macOS Apple Silicon**: `.dmg` (aarch64)
            - **macOS Intel**: `.dmg` (x64)
            - **Windows**: `.msi`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}
