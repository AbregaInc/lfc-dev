name: Release Tray App

on:
  push:
    tags: ['tray-v*']

permissions:
  contents: read

concurrency:
  group: release-tray-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    environment: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/tray
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Derive release version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#tray-v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported tray tag format: ${REF_NAME}" >&2
            exit 1
          fi

          echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Update tray versions from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs = require('fs'); const path = require('path'); const version = process.env.VERSION; const tauriPath = path.join('src-tauri', 'tauri.conf.json'); const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, 'utf8')); tauriConfig.package.version = version; fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2) + '\n'); const cargoPath = path.join('src-tauri', 'Cargo.toml'); const cargoToml = fs.readFileSync(cargoPath, 'utf8').replace(/^version = \".*\"$/m, 'version = \"' + version + '\"'); fs.writeFileSync(cargoPath, cargoToml);"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Prepare App Store Connect API key
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_API_PRIVATE_KEY }}" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
            printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Validate notarization credentials
        if: matrix.platform == 'macos-latest' && env.APPLE_API_KEY_PATH != ''
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euxo pipefail
          xcrun notarytool history \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" >/dev/null

      - name: Prepare macOS signing keychain
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail

          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          KEYCHAIN_PATH="$RUNNER_TEMP/lfc-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/lfc-signing-cert.p12"

          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '\"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${EXISTING_KEYCHAINS[@]}"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY_HASH="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk '/Developer ID Application:/ { print $2; exit }'
          )"
          if [ -z "$IDENTITY_HASH" ]; then
            echo "Developer ID Application identity not found in imported certificate" >&2
            exit 1
          fi
          echo "Using signing identity hash: $IDENTITY_HASH"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY_HASH" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$P12_PATH"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri v2 updater signing. Keep the legacy names for compatibility
          # with any older action-side helper code.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          projectPath: apps/tray
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'LFC ${{ steps.version.outputs.version }}'
          releaseBody: |
            Download the installer for your platform:
            - macOS Apple Silicon: `.dmg` (aarch64)
            - macOS Intel: `.dmg` (x64)
            - Windows: `.msi`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          assetNamePattern: '[name]_[arch][ext]'
          args: --target ${{ matrix.target }}

      - name: Print notarization history on failure
        if: failure() && matrix.platform == 'macos-latest' && env.APPLE_API_KEY_PATH != ''
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          xcrun notarytool history \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" || true

      - name: Cleanup macOS signing keychain
        if: always() && matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH" || true
          fi
