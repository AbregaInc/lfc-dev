name: Release Tray App

on:
  push:
    tags: ['tray-v*']

permissions:
  contents: read

concurrency:
  group: release-tray-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    environment: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/tray
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Derive release version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#tray-v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported tray tag format: ${REF_NAME}" >&2
            exit 1
          fi

          echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Update tray versions from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs = require('fs'); const path = require('path'); const version = process.env.VERSION; const tauriPath = path.join('src-tauri', 'tauri.conf.json'); const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, 'utf8')); if (tauriConfig.package) tauriConfig.package.version = version; else tauriConfig.version = version; fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2) + '\n'); const cargoPath = path.join('src-tauri', 'Cargo.toml'); const cargoToml = fs.readFileSync(cargoPath, 'utf8').replace(/^version = \".*\"$/m, 'version = \"' + version + '\"'); fs.writeFileSync(cargoPath, cargoToml);"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Prepare App Store Connect API key
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_API_PRIVATE_KEY }}" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
            printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Validate notarization credentials
        if: matrix.platform == 'macos-latest' && env.APPLE_API_KEY_PATH != ''
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euxo pipefail
          xcrun notarytool history \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" >/dev/null

      - name: Prepare macOS signing keychain
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail

          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          KEYCHAIN_PATH="$RUNNER_TEMP/lfc-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/lfc-signing-cert.p12"

          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '\"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${EXISTING_KEYCHAINS[@]}"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY_HASH="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk '/Developer ID Application:/ { print $2; exit }'
          )"
          if [ -z "$IDENTITY_HASH" ]; then
            echo "Developer ID Application identity not found in imported certificate" >&2
            exit 1
          fi
          echo "Using signing identity hash: $IDENTITY_HASH"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY_HASH" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$P12_PATH"

      - name: Prepare Tauri updater signing key
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          RAW_KEY="${RAW_TAURI_SIGNING_PRIVATE_KEY:-$RAW_TAURI_PRIVATE_KEY}"
          if [ -z "$RAW_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY or TAURI_PRIVATE_KEY secret"
            exit 1
          fi

          # Tauri expects a base64-encoded UTF-8 minisign secret key file.
          # Some existing secrets store the raw multiline file instead.
          if printf '%s' "$RAW_KEY" | grep -q 'untrusted comment:'; then
            KEY="$(printf '%s' "$RAW_KEY" | base64 | tr -d '\n')"
          else
            KEY="$RAW_KEY"
          fi

          KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-$TAURI_KEY_PASSWORD}"
          echo "::add-mask::$KEY"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY=$KEY"
            echo "TAURI_PRIVATE_KEY=$KEY"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$KEY_PASSWORD"
            echo "TAURI_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          projectPath: apps/tray
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'LFC ${{ steps.version.outputs.version }}'
          releaseBody: |
            Download the installer for your platform:
            - macOS Apple Silicon: `LFC_${{ steps.version.outputs.version }}_aarch64.dmg`
            - macOS Intel: `LFC_${{ steps.version.outputs.version }}_x64.dmg`
            - Windows: `LFC_${{ steps.version.outputs.version }}_x64.msi`
          # GitHub releases are immutable after publication. Keep the release
          # mutable while each matrix leg uploads its platform-specific assets.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          assetNamePattern: '[name]_${{ steps.version.outputs.version }}_[arch][ext]'
          args: --target ${{ matrix.target }}

      - name: Staple and replace macOS DMG assets
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          dmg_paths=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ "${#dmg_paths[@]}" -eq 0 ]; then
            echo "No DMG artifacts found for ${{ matrix.target }}" >&2
            exit 1
          fi

          for dmg_path in "${dmg_paths[@]}"; do
            xcrun notarytool submit "$dmg_path" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "$dmg_path"
            xcrun stapler validate "$dmg_path"
            spctl -a -t open --context context:primary-signature -vv "$dmg_path"

            case "${{ matrix.target }}" in
              aarch64-apple-darwin) asset_name="LFC_${VERSION}_aarch64.dmg" ;;
              x86_64-apple-darwin) asset_name="LFC_${VERSION}_x64.dmg" ;;
              *) echo "Unsupported macOS target: ${{ matrix.target }}" >&2; exit 1 ;;
            esac

            cp "$dmg_path" "$RUNNER_TEMP/$asset_name"
            gh release upload "$TAG" "$RUNNER_TEMP/$asset_name" \
              --repo "$REPOSITORY" \
              --clobber
          done

      - name: Print notarization history on failure
        if: failure() && matrix.platform == 'macos-latest' && env.APPLE_API_KEY_PATH != ''
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          xcrun notarytool history \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" || true

      - name: Cleanup macOS signing keychain
        if: always() && matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH" || true
          fi

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Derive release tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#tray-v}"
          echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest=false
